<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quake Globe — Live USGS Earthquakes in 3D</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body>
<div id="canvas-wrap"></div>
<div id="loading">Loading earthquakes…</div>

<div id="sheet">
<div id="panel">
  <h1>🌍 Quake Globe</h1>
  <div class="sub">Live data · USGS Earthquake Hazards Program</div>
  <div class="ctrl">
    <label for="feed">Time window</label>
    <select id="feed">
      <option value="all_hour">Past hour (all)</option>
      <option value="all_day" selected>Past 24 hours (all)</option>
      <option value="2.5_week">Past 7 days (M2.5+)</option>
      <option value="4.5_month">Past 30 days (M4.5+)</option>
      <option value="all_month">Past 30 days (all)</option>
      <option value="__hist" hidden>Historical query</option>
    </select>
  </div>
  <div class="ctrl">
    <label class="row"><span>Min magnitude</span><span id="magVal">0.0</span></label>
    <input type="range" id="minMag" min="0" max="7" step="0.1" value="0">
  </div>
  <details class="ctrl" id="histBox">
    <summary>Historical query</summary>
    <div class="hist-body">
      <label for="histStart">From</label>
      <input type="date" id="histStart" value="2011-03-01">
      <label for="histEnd">To</label>
      <input type="date" id="histEnd" value="2011-04-01">
      <label for="histMag">Min magnitude</label>
      <select id="histMag">
        <option value="4" selected>M4+</option>
        <option value="4.5">M4.5+</option>
        <option value="5">M5+</option>
        <option value="6">M6+</option>
        <option value="7">M7+</option>
      </select>
      <label for="histRegion">Region</label>
      <select id="histRegion">
        <option value="" selected>Worldwide</option>
        <option value="japan">Japan</option>
        <option value="indonesia">Indonesia</option>
        <option value="chile">Chile</option>
        <option value="california">California</option>
        <option value="alaska">Alaska</option>
        <option value="mediterranean">Mediterranean</option>
        <option value="newzealand">New Zealand</option>
      </select>
      <button id="histGo">Search archive</button>
      <div id="histNote"></div>
    </div>
  </details>
  <div class="ctrl">
    <label class="toggle"><input type="checkbox" id="spin" checked> Auto-rotate</label>
  </div>
  <div class="ctrl">
    <label class="toggle"><input type="checkbox" id="depthMode"> Depth view</label>
  </div>
  <div class="ctrl">
    <label class="toggle"><input type="checkbox" id="plates" checked> Plate boundaries</label>
  </div>
  <div class="ctrl">
    <label class="toggle"><input type="checkbox" id="live" checked> Live updates (5 min)</label>
  </div>
  <div class="ctrl">
    <label class="toggle"><input type="checkbox" id="sound"> Sound on new quakes</label>
  </div>
  <div id="stats">
    Showing <b id="count">0</b> quakes<br>
    Strongest: <b id="maxMag">–</b><br>
    <span class="hint">Drag to rotate · scroll to zoom · click a quake</span>
  </div>
</div>

<div id="legend">
  <div id="legendMag">
    <b class="legend-title">Magnitude</b>
    <div class="lg"><span class="dot" style="background:#4ade80"></span> &lt; 3.0</div>
    <div class="lg"><span class="dot" style="background:#facc15"></span> 3.0 – 4.5</div>
    <div class="lg"><span class="dot" style="background:#fb923c"></span> 4.5 – 6.0</div>
    <div class="lg"><span class="dot" style="background:#ef4444"></span> ≥ 6.0</div>
  </div>
  <div id="legendDepth" style="display:none">
    <b class="legend-title">Depth</b>
    <div class="lg"><span class="dot" style="background:#ff8c42"></span> 0 km</div>
    <div class="lg"><span class="dot" style="background:#facc15"></span> ~165 km</div>
    <div class="lg"><span class="dot" style="background:#4ade80"></span> ~330 km</div>
    <div class="lg"><span class="dot" style="background:#38bdf8"></span> ~500 km</div>
    <div class="lg"><span class="dot" style="background:#8b5cf6"></span> ≥ 660 km</div>
  </div>
</div>

<div id="sidebar">
  <b class="legend-title">Significant quakes</b>
  <ol id="sigList"></ol>
</div>
</div><!-- /sheet -->

<div id="timeline">
  <button id="playBtn" title="Play / pause timeline">▶</button>
  <input type="range" id="scrub" min="0" max="1000" step="1" value="1000">
  <span id="timeLabel">now</span>
</div>

<button id="sheetToggle" title="Show controls">☰</button>

<div id="banner"></div>
<div id="toast"></div>
<div id="tooltip"></div>
<div id="detail"><span class="close" id="detailClose">×</span><div id="detailBody"></div></div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
